<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Buddy — Real-Time Avatar</title>
<style>
  :root { --bg:#0b0d12; --card:#151922; --fg:#e8ecf3; --muted:#8b93a7; --accent:#5b8cff; --accent2:#3ad29f; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:radial-gradient(1200px 600px at 50% -10%,#1a2030,#0b0d12); color:var(--fg);
         min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { width:min(440px,100%); background:var(--card); border:1px solid #232a38; border-radius:20px;
          padding:20px; box-shadow:0 20px 60px rgba(0,0,0,.45); }
  h1 { font-size:18px; margin:0 0 2px; letter-spacing:.2px; }
  .sub { color:var(--muted); font-size:13px; margin:0 0 16px; }
  .stage { position:relative; aspect-ratio:1/1; background:#0b0d12; border-radius:16px; overflow:hidden;
           border:1px solid #232a38; }
  video { width:100%; height:100%; object-fit:cover; display:block; background:#0b0d12; }
  .pill { position:absolute; top:10px; left:10px; font-size:11px; padding:5px 10px; border-radius:999px;
          background:rgba(0,0,0,.55); color:var(--muted); backdrop-filter:blur(6px); }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#6b7280; margin-right:6px; vertical-align:middle; }
  .dot.live { background:var(--accent2); box-shadow:0 0 10px var(--accent2); }
  .row { display:flex; gap:10px; margin-top:16px; }
  button { flex:1; border:0; border-radius:12px; padding:13px 16px; font-size:15px; font-weight:600;
           cursor:pointer; transition:.15s transform,.15s opacity; }
  button:active { transform:translateY(1px); }
  button:disabled { opacity:.4; cursor:not-allowed; }
  .start { background:linear-gradient(135deg,var(--accent),#7aa2ff); color:#fff; }
  .stop  { background:#262c3a; color:var(--fg); }
  .status { margin-top:14px; font-size:12.5px; color:var(--muted); min-height:18px; }
  .hint { margin-top:6px; font-size:11.5px; color:#5b6475; }
  .upload { display:block; margin-top:12px; text-align:center; font-size:13px; color:var(--accent);
            cursor:pointer; padding:9px; border:1px dashed #2c3447; border-radius:10px; transition:.15s background,.15s border-color; }
  .upload:hover { background:#1b2230; border-color:var(--accent); }
  #poster { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }
  #poster.show { display:block; }
  .captions { margin-top:14px; min-height:42px; font-size:13.5px; line-height:1.45; }
  .cap-you { color:#cdd5e3; }
  .cap-bud { color:var(--accent2); margin-top:3px; min-height:18px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .dot.busy { background:#f5b740; box-shadow:0 0 10px #f5b740; animation:pulse 1s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="card">
    <h1>AI Buddy</h1>
    <p class="sub">Real-time conversational avatar · speak and it replies</p>

    <div class="stage">
      <img id="poster" alt="" />
      <video id="avatar" autoplay playsinline></video>
      <div class="pill"><span class="dot" id="dot"></span><span id="state">idle</span></div>
    </div>

    <div class="row">
      <button class="start" id="startBtn">Start call</button>
      <button class="stop" id="stopBtn" disabled>End</button>
    </div>
    <div class="status" id="status">Tap “Start call” and allow microphone access.</div>
    <div class="captions" id="captions">
      <div class="cap-you" id="capYou"></div>
      <div class="cap-bud" id="capBud"></div>
    </div>
    <div class="hint">Tip: use headphones — open speakers can echo back into the mic.</div>
    <label class="upload" id="uploadLabel">
      <input type="file" id="avatarFile" accept="image/*" hidden />
      📷 Use my own avatar (optional)
    </label>
  </div>

<script type="module">
  import { ModalWebRtcClient } from '/static/modal_webrtc.js';

  const video     = document.getElementById('avatar');
  const startBtn   = document.getElementById('startBtn');
  const stopBtn    = document.getElementById('stopBtn');
  const statusEl   = document.getElementById('status');
  const stateEl    = document.getElementById('state');
  const dot        = document.getElementById('dot');
  const poster     = document.getElementById('poster');
  const fileInput  = document.getElementById('avatarFile');
  const capYou     = document.getElementById('capYou');
  const capBud     = document.getElementById('capBud');

  const client = new ModalWebRtcClient();
  const remote = new MediaStream();

  const setStatus = (m) => { statusEl.textContent = m; };

  // Stable avatar id (persists) so an uploaded avatar sticks across refreshes.
  // The per-connection peer id is generated FRESH on each Start (below) with this
  // as a prefix — so signaling never collides on a reused id, while the avatar
  // still resolves from the stable prefix.
  const avatarId = localStorage.getItem('aibuddy_avatar') || client.generateShortUUID();
  localStorage.setItem('aibuddy_avatar', avatarId);

  fileInput.onchange = async () => {
    const file = fileInput.files[0];
    if (!file) return;
    poster.src = URL.createObjectURL(file);
    poster.classList.add('show');
    setStatus('Uploading avatar…');
    try {
      const fd = new FormData();
      fd.append('file', file);
      const r = await fetch(`/upload_avatar/${avatarId}`, { method: 'POST', body: fd });
      const j = await r.json();
      setStatus(j.ok ? 'Avatar set ✓ — tap “Start call”.' : ('Upload failed: ' + (j.error || '')));
    } catch (e) {
      setStatus('Upload error: ' + e.message);
    }
  };

  client.addEventListener('status', (e) => setStatus(e.detail.message));

  client.addEventListener('connectionStateChange', (e) => {
    const s = e.detail.state;
    stateEl.textContent = s;
    dot.classList.toggle('live', s === 'connected');
    if (s === 'connected') setStatus('Connected — just start talking.');
    if (s === 'failed' || s === 'disconnected' || s === 'closed') resetButtons();
  });

  // Server -> client status + captions, so you can SEE it working.
  let replyText = '';
  const STATE_LABEL = {
    transcribing: 'listening…', thinking: 'thinking…',
    speaking: 'speaking', idle: 'connected', error: 'error',
  };
  client.addEventListener('serverEvent', (e) => {
    const ev = e.detail;
    if (ev.type === 'user') {
      capYou.textContent = 'You: ' + ev.text;
      replyText = '';
      capBud.textContent = '';
    } else if (ev.type === 'reply') {
      replyText += ev.text + ' ';
      capBud.textContent = 'Buddy: ' + replyText.trim();
    } else if (ev.type === 'status') {
      const busy = ['transcribing', 'thinking', 'speaking'].includes(ev.state);
      stateEl.textContent = STATE_LABEL[ev.state] || ev.state;
      dot.classList.toggle('busy', busy);
      dot.classList.toggle('live', !busy && ev.state !== 'error');
    }
  });

  // Collect remote tracks (audio + video may arrive as separate streams).
  client.addEventListener('remoteStream', (e) => {
    e.detail.stream.getTracks().forEach((t) => {
      if (!remote.getTracks().some((x) => x.id === t.id)) remote.addTrack(t);
    });
    if (video.srcObject !== remote) video.srcObject = remote;
    video.play().catch(() => {});
    poster.classList.remove('show');  // live avatar now covers the preview
  });

  client.addEventListener('error', (e) => {
    console.error(e.detail.error);
    setStatus('Error: ' + (e.detail.error?.message || e.detail.error));
    resetButtons();
  });

  function resetButtons() {
    startBtn.disabled = false;
    stopBtn.disabled = true;
  }

  startBtn.onclick = async () => {
    startBtn.disabled = true;
    client.peerID = avatarId + '.' + client.generateShortUUID();  // fresh, unique per call
    try {
      setStatus('Requesting microphone…');
      client.localStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
        video: false,
      });
      stopBtn.disabled = false;
      await client.startStreaming();
    } catch (err) {
      setStatus('Mic/connection error: ' + err.message);
      resetButtons();
    }
  };

  stopBtn.onclick = async () => {
    await client.stopStreaming();
    setStatus('Call ended.');
    stateEl.textContent = 'idle';
    dot.classList.remove('live');
    resetButtons();
  };
</script>
</body>
</html>
